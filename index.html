<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공간의 결 - AI 프리미엄 배경화면 아틀리에</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Poppins:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #050505;
            --bronze: #A67C52;
            --gold: #D4AF37;
            --text-main: #e0e0e0;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Gowun Batang', serif;
            scroll-behavior: smooth;
        }

        /* --- Header --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            box-sizing: border-box;
        }

        .logo {
            font-size: 1.6em;
            font-weight: 700;
            letter-spacing: 6px;
            color: var(--bronze);
            text-transform: uppercase;
        }

        /* --- Hero Section (Blurred for Quality) --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            padding: 0 20px;
        }

        .hero-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('images/hero_omotenashi.jpg');
            background-size: cover;
            background-position: center;
            filter: brightness(0.4) blur(10px); /* 화질 문제를 예술적 블러로 해결 */
            transform: scale(1.1); /* 블러 경계선 방지 */
            z-index: -1;
        }

        .hero h1 {
            font-size: 4.5em;
            margin: 0;
            font-weight: 400;
            letter-spacing: 15px;
            color: var(--bronze);
            text-shadow: 0 0 40px rgba(0,0,0,1);
            animation: glow 3s infinite alternate;
        }

        .welcome-text {
            font-size: 1em;
            color: var(--gold);
            margin-bottom: 25px;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-family: 'Poppins', sans-serif;
        }

        .hero p {
            font-size: 1.4em;
            color: #ccc;
            margin-top: 25px;
            font-weight: 300;
            letter-spacing: 3px;
            line-height: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        /* --- AI Input Section --- */
        .ai-container {
            margin-top: 80px;
            width: 100%;
            max-width: 750px;
            position: relative;
        }

        .ai-input-wrapper {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(166, 124, 82, 0.4);
            border-radius: 60px;
            padding: 10px 10px 10px 35px;
            display: flex;
            align-items: center;
            backdrop-filter: blur(20px);
            transition: 0.4s;
        }

        .ai-input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.1em;
            font-family: 'Gowun Batang', serif;
        }

        .ai-input-wrapper input:focus { outline: none; }

        .generate-btn {
            background: linear-gradient(45deg, var(--bronze), var(--gold));
            color: #000;
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 2px;
        }

        .generate-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--gold-glow);
        }

        /* --- Category Section --- */
        .categories {
            padding: 150px 50px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            margin-top: 70px;
        }

        .cat-card {
            height: 550px;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 15px 45px rgba(0,0,0,0.5);
        }

        .cat-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.4) saturate(0.6);
            transition: 0.6s;
        }

        .cat-card:hover { border-color: var(--gold); transform: translateY(-15px); }
        .cat-card:hover img { filter: brightness(0.9) saturate(1); transform: scale(1.1); }

        .cat-info {
            position: absolute;
            bottom: 45px;
            left: 40px;
            z-index: 2;
        }

        .cat-info h3 {
            font-size: 1.8em;
            margin: 0;
            color: #fff;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .cat-info p {
            font-size: 0.85em;
            color: var(--gold);
            margin-top: 10px;
            letter-spacing: 4px;
            font-family: 'Poppins', sans-serif;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(166, 124, 82, 0.3); }
            to { text-shadow: 0 0 50px rgba(212, 175, 55, 0.6); }
        }

        footer {
            padding: 100px 50px;
            text-align: center;
            color: #444;
            font-size: 0.9em;
            border-top: 1px solid rgba(255,255,255,0.03);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">空間의 結</div>
    </nav>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="welcome-text">Omotenashi Spirit</div>
        <h1>공간의 결</h1>
        <p>지극한 예우로 빚어낸,<br>당신만을 위한 단 하나의 풍경을 선사합니다.</p>

        <div class="ai-container">
            <div class="ai-input-wrapper">
                <input type="text" placeholder="어떤 찰나의 미학을 그려드릴까요?">
                <button class="generate-btn">CREATE</button>
            </div>
            <div style="margin-top: 30px; color: #444; font-size: 0.95em; letter-spacing: 2px;">
                "꽃을 든 한복 여인", "황금빛 안개가 자욱한 새벽 숲"
            </div>
        </div>
    </section>

    <section class="categories">
        <h2 style="text-align: center; letter-spacing: 12px; color: #555; font-size: 1.1em; text-transform: uppercase; margin-bottom: 20px;">The Masterpieces</h2>
        <p style="text-align: center; color: #333; letter-spacing: 3px; font-size: 0.9em; margin-bottom: 80px;">품격 있는 시선으로 큐레이팅된 4가지 결</p>
        
        <div class="category-grid">
            <!-- SHIZEN -->
            <div class="cat-card">
                <img src="https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=1000&auto=format&fit=crop" alt="Nature">
                <div class="cat-info">
                    <h3>자연의 숨결</h3>
                    <p>SHIZEN</p>
                </div>
            </div>
            <!-- INOCHI -->
            <div class="cat-card">
                <img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d?q=80&w=1000&auto=format&fit=crop" alt="Lion">
                <div class="cat-info">
                    <h3>생명의 눈빛</h3>
                    <p>INOCHI</p>
                </div>
            </div>
            <!-- YUTAKA -->
            <div class="cat-card">
                <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1000&auto=format&fit=crop" alt="Gold">
                <div class="cat-info">
                    <h3>풍요의 빛</h3>
                    <p>YUTAKA</p>
                </div>
            </div>
            <!-- ENISHI -->
            <div class="cat-card">
                <img src="https://images.unsplash.com/photo-1528127269322-539801943592?q=80&w=1000&auto=format&fit=crop" alt="Mood">
                <div class="cat-info">
                    <h3>인연의 기록</h3>
                    <p>ENISHI</p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 空間의 結 (Gyeol of Space). All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
