<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공간의 결 - AI 프리미엄 배경화면 아틀리에</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Poppins:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #050505;
            --bronze: #A67C52;
            --gold: #D4AF37;
            --text-main: #e0e0e0;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Gowun Batang', serif;
            scroll-behavior: smooth;
        }

        /* --- Nav --- */
        nav {
            position: fixed; top: 0; width: 100%;
            padding: 30px 50px; display: flex;
            justify-content: space-between; align-items: center;
            z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            box-sizing: border-box;
        }
        .logo { font-size: 1.6em; font-weight: 700; letter-spacing: 6px; color: var(--bronze); text-transform: uppercase; }

        /* --- Hero --- */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            position: relative; overflow: hidden; padding: 0 20px;
        }
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('images/hero_omotenashi.jpg');
            background-size: cover; background-position: center;
            filter: brightness(0.3) blur(8px); transform: scale(1.1); z-index: -1;
        }
        .hero h1 { font-size: 4.5em; margin: 0; letter-spacing: 15px; color: var(--bronze); animation: glow 3s infinite alternate; }
        .welcome-text { font-size: 1em; color: var(--gold); margin-bottom: 20px; letter-spacing: 8px; text-transform: uppercase; font-family: 'Poppins', sans-serif; }
        .hero p { font-size: 1.4em; color: #888; margin-top: 20px; letter-spacing: 2px; }

        /* --- AI Interface --- */
        .ai-container { margin-top: 60px; width: 100%; max-width: 800px; position: relative; }
        .ai-input-wrapper {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(166, 124, 82, 0.3);
            border-radius: 60px; padding: 10px 10px 10px 35px;
            display: flex; align-items: center; backdrop-filter: blur(20px);
        }
        .ai-input-wrapper input { flex: 1; background: transparent; border: none; color: #fff; font-size: 1.1em; font-family: 'Gowun Batang'; }
        .ai-input-wrapper input:focus { outline: none; }
        .generate-btn {
            background: linear-gradient(45deg, var(--bronze), var(--gold));
            color: #000; border: none; padding: 18px 50px; border-radius: 50px;
            font-weight: 800; cursor: pointer; transition: 0.3s; font-family: 'Poppins';
        }
        .generate-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--gold-glow); }

        /* --- Result Display --- */
        #result-area {
            display: none; margin-top: 50px; text-align: center;
            animation: fadeIn 1.5s ease;
        }
        .result-image {
            width: 320px; height: 568px; /* 9:16 ratio */
            border-radius: 20px; border: 2px solid var(--bronze);
            box-shadow: 0 0 50px rgba(166, 124, 82, 0.3);
            object-fit: cover; margin-bottom: 20px;
        }
        .download-btn {
            display: inline-block; padding: 12px 30px; border-radius: 30px;
            border: 1px solid var(--gold); color: var(--gold);
            text-decoration: none; font-size: 0.9em; transition: 0.3s;
        }
        .download-btn:hover { background: var(--gold); color: #000; }

        /* --- Hall of Fame (명예의 전당) --- */
        .gallery { padding: 100px 50px; max-width: 1200px; margin: 0 auto; }
        .gallery-title { text-align: center; margin-bottom: 60px; }
        .gallery-title h2 { font-size: 2.5em; color: var(--gold); letter-spacing: 10px; margin-bottom: 10px; }
        .gallery-title p { color: #555; letter-spacing: 3px; }

        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }
        .gallery-card {
            height: 400px; border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05); position: relative;
            cursor: pointer; transition: 0.4s;
        }
        .gallery-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); transition: 0.4s; }
        .gallery-card:hover img { filter: brightness(1); transform: scale(1.05); }
        .gallery-card .tag {
            position: absolute; bottom: 20px; left: 20px;
            font-size: 0.7em; color: var(--gold); letter-spacing: 2px;
        }

        @keyframes glow { from { text-shadow: 0 0 10px rgba(166, 124, 82, 0.3); } to { text-shadow: 0 0 50px rgba(212, 175, 55, 0.6); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Loading */
        #loading { display: none; margin-top: 30px; color: var(--gold); letter-spacing: 3px; font-size: 0.9em; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(166, 124, 82, 0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer { padding: 80px; text-align: center; color: #333; font-size: 0.8em; border-top: 1px solid rgba(255,255,255,0.02); }
    </style>
</head>
<body>
    <nav><div class="logo">空間의 結</div></nav>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="welcome-text">Omotenashi Spirit</div>
        <h1>공간의 결</h1>
        <p>지극한 예우로 빚어낸,<br>당신만을 위한 단 하나의 풍경을 선사합니다.</p>

        <div class="ai-container">
            <div class="ai-input-wrapper">
                <input type="text" id="user-prompt" placeholder="어떤 찰나의 미학을 그려드릴까요?">
                <button class="generate-btn" onclick="generateArt()">CREATE</button>
            </div>
            
            <div id="loading">
                <div class="spinner"></div>
                당신의 결을 빚어내는 중입니다...
            </div>

            <div id="result-area">
                <img src="" id="generated-img" class="result-image">
                <br>
                <a href="#" id="download-link" class="download-btn" download="my_space_gyeol.jpg">DOWNLOAD MASTERPIECE</a>
            </div>
        </div>
    </section>

    <section class="gallery">
        <div class="gallery-title">
            <h2>HALL OF FAME</h2>
            <p>오늘의 베스트 결 : 명예의 전당</p>
        </div>
        <div class="gallery-grid">
            <div class="gallery-card">
                <img src="https://images.unsplash.com/photo-1493246507139-91e8bef99c02?q=80&w=1000" alt="Gyeol 1">
                <div class="tag">#001 NATURE</div>
            </div>
            <div class="gallery-card">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000" alt="Gyeol 2">
                <div class="tag">#002 ABSTRACT</div>
            </div>
            <div class="gallery-card">
                <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000" alt="Gyeol 3">
                <div class="tag">#003 LUXURY</div>
            </div>
            <div class="gallery-card">
                <img src="https://images.unsplash.com/photo-1579546929518-9e396f3cc809?q=80&w=1000" alt="Gyeol 4">
                <div class="tag">#004 DREAMY</div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 空間의 結 (Gyeol of Space). All Rights Reserved.</p>
    </footer>

    <script>
        async function generateArt() {
            const prompt = document.getElementById('user-prompt').value;
            if(!prompt) { alert("그리려는 풍경을 입력해주세요."); return; }

            const loading = document.getElementById('loading');
            const resultArea = document.getElementById('result-area');
            
            loading.style.display = 'block';
            resultArea.style.display = 'none';

            // 💡 [알림] 실제 AI 연결을 위해서는 수성님의 OpenAI API 키가 필요합니다.
            // 지금은 '미학적 로직'만 완성하여 시뮬레이션으로 보여드립니다.
            
            setTimeout(() => {
                loading.style.display = 'none';
                resultArea.style.display = 'block';
                const img = document.getElementById('generated-img');
                // 테스트용 고화질 9:16 이미지
                img.src = "https://images.unsplash.com/photo-1536431311719-398b6704d4cc?q=80&w=1000&auto=format&fit=crop";
                document.getElementById('download-link').href = img.src;
                
                resultArea.scrollIntoView({ behavior: 'smooth' });
            }, 3000);
        }
    </script>
</body>
</html>
