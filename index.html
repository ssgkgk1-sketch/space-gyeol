<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공간의 결 - AI 프리미엄 배경화면 아틀리에</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Poppins:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg-deep: #050505;
            --bronze: #A67C52;
            --gold: #D4AF37;
            --text-main: #e0e0e0;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Gowun Batang', serif;
            scroll-behavior: smooth;
        }

        nav {
            position: fixed; top: 0; width: 100%;
            padding: 30px 50px; display: flex;
            justify-content: space-between; align-items: center;
            z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            box-sizing: border-box;
        }
        .logo { font-size: 1.6em; font-weight: 700; letter-spacing: 6px; color: var(--bronze); text-transform: uppercase; }

        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            position: relative; overflow: hidden; padding: 0 20px;
        }
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('images/hero_omotenashi.jpg');
            background-size: cover; background-position: center;
            filter: brightness(0.3) blur(8px); transform: scale(1.1); z-index: -1;
        }
        .hero h1 { font-size: 4.5em; margin: 0; letter-spacing: 15px; color: var(--bronze); animation: glow 3s infinite alternate; }
        .welcome-text { font-size: 1em; color: var(--gold); margin-bottom: 20px; letter-spacing: 8px; text-transform: uppercase; font-family: 'Poppins', sans-serif; }
        .hero p { font-size: 1.4em; color: #888; margin-top: 20px; letter-spacing: 2px; }

        .ai-container { margin-top: 60px; width: 100%; max-width: 750px; position: relative; }
        .ai-input-wrapper {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(166, 124, 82, 0.3);
            border-radius: 60px; padding: 10px 10px 10px 35px;
            display: flex; align-items: center; backdrop-filter: blur(20px);
        }
        .ai-input-wrapper input { flex: 1; background: transparent; border: none; color: #fff; font-size: 1.1em; font-family: 'Gowun Batang'; }
        .ai-input-wrapper input:focus { outline: none; }
        .generate-btn {
            background: linear-gradient(45deg, var(--bronze), var(--gold));
            color: #000; border: none; padding: 18px 50px; border-radius: 50px;
            font-weight: 800; cursor: pointer; transition: 0.3s; font-family: 'Poppins';
        }
        .generate-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--gold-glow); }

        #result-area {
            display: none; margin-top: 50px; text-align: center;
            animation: fadeIn 1.5s ease;
        }
        .result-image {
            width: 320px; height: 568px;
            border-radius: 20px; border: 2px solid var(--bronze);
            box-shadow: 0 0 50px rgba(166, 124, 82, 0.3);
            object-fit: cover; margin-bottom: 20px;
        }
        .download-btn {
            display: inline-block; padding: 12px 30px; border-radius: 30px;
            border: 1px solid var(--gold); color: var(--gold);
            text-decoration: none; font-size: 0.9em; transition: 0.3s;
        }
        .download-btn:hover { background: var(--gold); color: #000; }

        /* --- Collections --- */
        .categories { padding: 100px 50px; max-width: 1300px; margin: 0 auto; }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; margin-top: 70px; }
        .cat-card { height: 500px; border-radius: 30px; overflow: hidden; position: relative; cursor: pointer; transition: 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); border: 1px solid rgba(255,255,255,0.08); }
        .cat-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); transition: 0.6s; }
        .cat-card:hover { border-color: var(--gold); transform: translateY(-10px); }
        .cat-card:hover img { filter: brightness(0.8); transform: scale(1.1); }
        .cat-info { position: absolute; bottom: 40px; left: 30px; }
        .cat-info h3 { font-size: 1.6em; margin: 0; color: #fff; letter-spacing: 2px; }
        .cat-info p { font-size: 0.8em; color: var(--gold); margin-top: 8px; letter-spacing: 3px; font-family: 'Poppins'; }

        @keyframes glow { from { text-shadow: 0 0 10px rgba(166, 124, 82, 0.3); } to { text-shadow: 0 0 50px rgba(212, 175, 55, 0.6); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        #loading { display: none; margin-top: 30px; color: var(--gold); letter-spacing: 3px; font-size: 0.9em; text-align: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(166, 124, 82, 0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer { padding: 80px; text-align: center; color: #333; font-size: 0.8em; border-top: 1px solid rgba(255,255,255,0.02); }
    </style>
</head>
<body>
    <nav><div class="logo">空間의 結</div></nav>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="welcome-text">Omotenashi Spirit</div>
        <h1>공간의 결</h1>
        <p>지극한 예우로 빚어낸,<br>당신만을 위한 단 하나의 풍경을 선사합니다.</p>

        <div class="ai-container">
            <div class="ai-input-wrapper">
                <input type="text" id="user-prompt" placeholder="어떤 찰나의 미학을 그려드릴까요?">
                <button class="generate-btn" onclick="generateArt()">CREATE</button>
            </div>
            <div id="loading"><div class="spinner"></div>당신의 결을 빚어내는 중입니다...</div>
            <div id="result-area">
                <img src="" id="generated-img" class="result-image">
                <br>
                <a href="#" id="download-link" class="download-btn" download="my_space_gyeol.jpg">DOWNLOAD MASTERPIECE</a>
            </div>
        </div>
    </section>

    <section class="categories">
        <h2 style="text-align: center; letter-spacing: 12px; color: #555; font-size: 1.1em; text-transform: uppercase; margin-bottom: 80px;">The Collections</h2>
        <div class="category-grid">
            <div class="cat-card"><img src="https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=1000" alt="SHIZEN"><div class="cat-info"><h3>자연의 숨결</h3><p>SHIZEN</p></div></div>
            <div class="cat-card"><img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d?q=80&w=1000" alt="INOCHI"><div class="cat-info"><h3>생명의 눈빛</h3><p>INOCHI</p></div></div>
            <div class="cat-card"><img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1000" alt="YUTAKA"><div class="cat-info"><h3>풍요의 빛</h3><p>YUTAKA</p></div></div>
            <div class="cat-card"><img src="https://images.unsplash.com/photo-1528127269322-539801943592?q=80&w=1000" alt="ENISHI"><div class="cat-info"><h3>인연의 기록</h3><p>ENISHI</p></div></div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 空間의 結 (Gyeol of Space). All Rights Reserved.</p>
    </footer>

    <script>
        // 키워드별 명품 이미지 데이터베이스 (사장님이 원하시는 로직)
        const imageDB = {
            "꽃": [
                "https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=1000",
                "https://images.unsplash.com/photo-1470770841072-f978cf4d019e?q=80&w=1000"
            ],
            "일본": [
                "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=1000",
                "https://images.unsplash.com/photo-1528360983277-13d401cdc186?q=80&w=1000"
            ],
            "돈": [
                "https://images.unsplash.com/photo-1518458028785-8fbcd101ebb9?q=80&w=1000",
                "https://images.unsplash.com/photo-1561414927-6d86591d0c4f?q=80&w=1000"
            ],
            "동물": [
                "https://images.unsplash.com/photo-1546182990-dffeafbe841d?q=80&w=1000",
                "https://images.unsplash.com/photo-1474511320723-9a5617389965?q=80&w=1000"
            ],
            "인물": [
                "https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?q=80&w=1000",
                "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=1000"
            ]
        };

        const defaultImages = [
            "https://images.unsplash.com/photo-1536431311719-398b6704d4cc?q=80&w=1000",
            "https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1000",
            "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=1000"
        ];

        function generateArt() {
            const prompt = document.getElementById('user-prompt').value;
            if(!prompt) { alert("그리려는 풍경을 입력해주세요."); return; }
            
            const loading = document.getElementById('loading');
            const resultArea = document.getElementById('result-area');
            loading.style.display = 'block';
            resultArea.style.display = 'none';
            
            setTimeout(() => {
                loading.style.display = 'none';
                resultArea.style.display = 'block';
                const img = document.getElementById('generated-img');
                
                // 키워드 매칭 로직 (사장님이 입력한 글자에 따라 어울리는 사진 선택!)
                let source = defaultImages;
                for (let key in imageDB) {
                    if (prompt.includes(key)) {
                        source = imageDB[key];
                        break;
                    }
                }
                
                const finalImg = source[Math.floor(Math.random() * source.length)];
                img.src = finalImg;
                document.getElementById('download-link').href = finalImg;
                resultArea.scrollIntoView({ behavior: 'smooth' });
            }, 2500);
        }
    </script>
</body>
</html>
